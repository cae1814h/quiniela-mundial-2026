kind = "mobile"
previewPath = "/mobile/"
title = "Quiniela Mundial — App Móvil"
version = "1.0.0"
id = "artifacts/quiniela-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 20800

[services.development]
run = "pnpm --filter @workspace/quiniela-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quiniela-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/quiniela-mobile", "run", "serve" ]

[services.env]
PORT = "20800"
BASE_PATH = "/mobile/"
